<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Supervisor System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background: #4CAF50; color: white; padding: 15px; text-align: center; }
        .container { padding: 20px; }
        .button { padding: 10px 15px; margin: 10px 0; border: none; cursor: pointer; }
        .hidden { display: none; }
        /* Responsive Design */
        @media (max-width: 600px) {
            .container { padding: 10px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Personal Supervisor System</h1>
    </header>
    <div class="container">
        <div id="login">
            <h2>Login</h2>
            <label for="role">Select Role:</label>
            <select id="role">
                <option value="student">Student</option>
                <option value="supervisor">Personal Supervisor</option>
                <option value="tutor">Senior Tutor</option>
            </select>
            <button class="button" onclick="login()">Login</button>
        </div>

        <div id="studentDashboard" class="hidden">
            <h2>Student Dashboard</h2>
            <button class="button" onclick="submitReport()">Submit Wellbeing/Progress Report</button>
            <button class="button" onclick="bookMeeting()">Book Meeting</button>
            <button class="button" onclick="viewHistory()">View Report History</button>
        </div>

        <div id="supervisorDashboard" class="hidden">
            <h2>Supervisor Dashboard</h2>
            <button class="button" onclick="viewAssignedStudents()">View Assigned Students</button>
            <button class="button" onclick="manageMeetings()">Manage Meetings</button>
        </div>

        <div id="tutorDashboard" class="hidden">
            <h2>Tutor Dashboard</h2>
            <button class="button" onclick="viewAllStudents()">View All Students</button>
        </div>
    </div>

    <script>
        function login() {
            const role = document.getElementById('role').value;
            document.getElementById('login').classList.add('hidden');
            if (role === 'student') {
                document.getElementById('studentDashboard').classList.remove('hidden');
            } else if (role === 'supervisor') {
                document.getElementById('supervisorDashboard').classList.remove('hidden');
            } else if (role === 'tutor') {
                document.getElementById('tutorDashboard').classList.remove('hidden');
            }
        }

        function submitReport() {
            alert('Submitting report...');
            // Handle report submission logic here
        }

        function bookMeeting() {
            alert('Booking a meeting...');
            // Handle meeting booking logic here
        }

        function viewHistory() {
            alert('Viewing report history...');
            // Handle history view logic here
        }

        function viewAssignedStudents() {
            alert('Viewing assigned students...');
            // Handle assigned students logic here
        }

        function manageMeetings() {
            alert('Managing meetings...');
            // Handle meeting management logic here
        }

        function viewAllStudents() {
            alert('Viewing all students...');
            // Handle viewing all students logic here
        }
    </script>
</body>
</html>
